name: Build ImmortalWrt firmware (TL-MR6400 v4 profile)

# TL-MR6400 (EU) V3 has no upstream OpenWrt/ImmortalWrt device profile of
# its own. We build using the tplink_tl-mr6400-v4 profile instead: it's the
# same product line/hardware revision (not a different model like the
# MR3420), is natively supported by ImmortalWrt (no source patches needed),
# and its device packages already assume the same internal USB-attached LTE
# modem wiring this board has. We strip the LTE/USB/PPP packages below since
# they aren't needed, but they can be re-added later if LTE is wanted.
#
# This is still unverified for v3 specifically - see README.md before flashing.
#
# FLASH IS EXTREMELY TIGHT ON THIS DEVICE. The "firmware" MTD partition is a
# fixed 7808k, split at build time into kernel + squashfs rootfs, with
# whatever's left over (rounded down to erase-block size) becoming the
# writable rootfs_data (overlay) partition. A first build here (luci +
# stripped USB/LTE/PPP, nothing else) left only ~256KB / 4 erase blocks for
# rootfs_data - too small for JFFS2 to mount at all ("Too few erase blocks
# (4)" in the kernel log), so the system silently fell back to a RAM-only
# tmpfs overlay on every single boot. Symptom: LuCI looks fine, but every
# setting (root password, language, wifi config, everything) reverts on
# reboot, because nothing was ever actually written to flash. This is why
# tailscale is NOT in this package list even though it's genuinely useful -
# baking it in was tried and made the space problem worse, not better. It
# should be installed post-flash instead, once there's confirmed working
# persistent storage to install it onto.
env:
  TARGET: ramips
  SUBTARGET: mt76x8
  PROFILE: tplink_tl-mr6400-v4
  ARCH: mipsel_24kc
  # Packages to add/remove from the default image.
  # Defaults already include: luci, dnsmasq-full, firewall4, nftables, wpad-basic-openssl,
  # kmod-mt7603 (wifi), odhcp6c, odhcpd-ipv6only, and (from the mr6400-v4
  # device definition) USB + LTE modem support (kmod-usb2, kmod-usb-ohci,
  # kmod-usb-ledtrig-usbport, kmod-usb-serial-option, kmod-usb-net-qmi-wwan,
  # uqmi) + ppp/ppp-mod-pppoe.
  #
  # Stripped to actually leave room for a working overlay:
  # - USB/LTE/PPP: not needed on this hardware use case.
  # - IPv6 (odhcp6c, odhcpd-ipv6only): not needed; the kernel still has IPv6
  #   itself built in (not a removable module), this only drops the DHCPv6
  #   client/server userspace bits.
  # - dnsmasq-full -> dnsmasq: the "full" build adds DNSSEC/extra features
  #   we don't use; the base package covers DHCP+DNS for a home LAN.
  # - openssl -> mbedtls: mbedTLS is meaningfully smaller than OpenSSL in an
  #   embedded build. Swapping both wpad's and libustream's TLS backend
  #   together (mixing the two would just pull in both libraries, worse than
  #   either alone) was still short by ~130KB, so this covers the rest.
  PACKAGES: >-
    luci
    dnsmasq
    wpad-basic-mbedtls
    libustream-mbedtls
    -dnsmasq-full
    -odhcp6c
    -odhcpd-ipv6only
    -wpad-basic-openssl
    -libustream-openssl
    -kmod-usb2
    -kmod-usb-ohci
    -kmod-usb-ledtrig-usbport
    -kmod-usb-serial-option
    -kmod-usb-net-qmi-wwan
    -uqmi
    -ppp
    -ppp-mod-pppoe

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: "ImmortalWrt release version"
        required: true
        default: "25.12.1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.inputs.immortalwrt_version || '25.12.1' }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Download ImageBuilder
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          FILE="immortalwrt-imagebuilder-${VERSION}-${TARGET}-${SUBTARGET}.Linux-x86_64.tar.zst"
          URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}/${FILE}"
          echo "Downloading $URL"
          curl -fL -o imagebuilder.tar.zst "$URL"
          mkdir -p imagebuilder
          tar --use-compress-program=unzstd -xf imagebuilder.tar.zst -C imagebuilder --strip-components=1

      - name: Build firmware image
        run: |
          set -euo pipefail
          cd imagebuilder
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES="${PACKAGES}"

      - name: Check overlay headroom
        run: |
          set -euo pipefail
          FIRMWARE_BUDGET=7995392  # 7808k, the fixed "firmware" MTD partition size for this profile
          MIN_OVERLAY=1048576      # want at least 1MB free for a reliably-mountable JFFS2 overlay
          IMG="$(find imagebuilder/bin/targets/${TARGET}/${SUBTARGET} -iname '*squashfs-sysupgrade.bin')"
          SIZE=$(stat -c%s "$IMG")
          FREE=$((FIRMWARE_BUDGET - SIZE))
          echo "Firmware image: $IMG"
          echo "Image size: $SIZE bytes"
          echo "Estimated overlay headroom: $FREE bytes"
          if [ "$FREE" -lt "$MIN_OVERLAY" ]; then
            echo "::error::Only ${FREE} bytes would be left for the writable overlay (want >= ${MIN_OVERLAY}). JFFS2 will likely fail to mount and settings won't persist across reboots - see the comment block at the top of this workflow file. Trim PACKAGES further."
            exit 1
          fi

      - name: Collect output
        run: |
          set -euo pipefail
          mkdir -p out
          cp imagebuilder/bin/targets/${TARGET}/${SUBTARGET}/*${PROFILE}* out/
          ls -lh out/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ steps.ver.outputs.version }}-${{ env.PROFILE }}
          path: out/
          retention-days: 30
