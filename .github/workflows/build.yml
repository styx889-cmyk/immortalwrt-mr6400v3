name: Build ImmortalWrt firmware (TL-MR6400 v4 profile)

# TL-MR6400 (EU) V3 has no upstream OpenWrt/ImmortalWrt device profile of
# its own. We build using the tplink_tl-mr6400-v4 profile instead: it's the
# same product line/hardware revision (not a different model like the
# MR3420), is natively supported by ImmortalWrt (no source patches needed),
# and its device packages already assume the same internal USB-attached LTE
# modem wiring this board has. We strip the LTE/USB/PPP packages below since
# they aren't needed, but they can be re-added later if LTE is wanted.
#
# This is still unverified for v3 specifically - see README.md before flashing.
#
# FLASH IS EXTREMELY TIGHT ON THIS DEVICE. The "firmware" MTD partition is a
# fixed 7808k, split at build time into kernel + squashfs rootfs, with
# whatever's left over (rounded down to erase-block size) becoming the
# writable rootfs_data (overlay) partition. A first build here (luci +
# stripped USB/LTE/PPP, nothing else) left only ~256KB / 4 erase blocks for
# rootfs_data - too small for JFFS2 to mount at all ("Too few erase blocks
# (4)" in the kernel log), so the system silently fell back to a RAM-only
# tmpfs overlay on every single boot. Symptom: LuCI looks fine, but every
# setting (root password, language, wifi config, everything) reverts on
# reboot, because nothing was ever actually written to flash. This is why
# tailscale is NOT in this package list even though it's genuinely useful -
# baking it in was tried and made the space problem worse, not better.
#
# Even the leanest build of tailscaled for this arch is a few MB (6.2MB
# stripped+UPX'd, measured from a same-arch third-party build) - nowhere
# close to fitting in the ~650KB overlay this device actually has. But RAM
# is not the constraint here (56MB total, tens of MB free at idle), so
# build-tailscale below cross-compiles tailscaled via the SDK, strips and
# UPX-compresses it, and publishes it to this repo's `tailscale-latest`
# GitHub Release. files/etc/init.d/tailscale-ram (baked into the firmware
# via FILES=, a few KB, no flash problem) fetches that binary into tmpfs at
# boot, checksum-verified, and runs it from there - only its small state
# file (node identity/keys) lives on the real persistent overlay, so
# `tailscale up` doesn't need to be redone after every reboot even though
# the binary does get re-fetched each time.
env:
  TARGET: ramips
  SUBTARGET: mt76x8
  PROFILE: tplink_tl-mr6400-v4
  ARCH: mipsel_24kc
  # Packages to add/remove from the default image.
  # Defaults already include: luci, dnsmasq-full, firewall4, nftables, wpad-basic-openssl,
  # kmod-mt7603 (wifi), odhcp6c, odhcpd-ipv6only, and (from the mr6400-v4
  # device definition) USB + LTE modem support (kmod-usb2, kmod-usb-ohci,
  # kmod-usb-ledtrig-usbport, kmod-usb-serial-option, kmod-usb-net-qmi-wwan,
  # uqmi) + ppp/ppp-mod-pppoe.
  #
  # Stripped to actually leave room for a working overlay:
  # - USB/LTE/PPP: not needed on this hardware use case.
  # - IPv6 (odhcp6c, odhcpd-ipv6only): not needed; the kernel still has IPv6
  #   itself built in (not a removable module), this only drops the DHCPv6
  #   client/server userspace bits.
  # - dnsmasq-full -> dnsmasq: the "full" build adds DNSSEC/extra features
  #   we don't use; the base package covers DHCP+DNS for a home LAN.
  #
  # Tried and reverted: swapping openssl -> mbedtls for wpad/libustream.
  # Measured *smaller* free space with mbedtls (720611 bytes) than with the
  # openssl defaults (917219 bytes) on this particular build - the opposite
  # of the usual assumption. Left on openssl (i.e. just not overriding the
  # defaults) since it measurably wins here.
  #
  # kmod-tun: tailscaled DEPENDS on this (not built into the kernel here,
  # unlike IPv6) - needed for the TUN device it creates. Small (~21KB), not
  # baked-in tailscaled itself - see the tailscale-ram comment above.
  #
  # kmod-zram + zram-swap + swap-utils: tailscaled's Go runtime genuinely
  # needs more resident memory (~15MB) than this device has free (~10.7MB
  # available per `free`, out of 56MB total, no swap) - confirmed on real
  # hardware via dmesg: `__vm_enough_memory` rejected its initial
  # allocation, and even after `sysctl vm.overcommit_memory=1` plus
  # aggressive GOGC=20/GOMEMLIMIT=10MiB tuning, the OOM killer still killed
  # it (anon-rss:15004kB at kill time).
  #
  # Getting swap actually working here took more than adding a package:
  # 1. The zram-swap package's own init script calls `busybox mkswap`/
  #    `busybox swapon` explicitly - this device's busybox build doesn't
  #    have those applets (absent from `busybox --help`), so it silently
  #    no-ops. Not used here for that reason - see
  #    files/etc/init.d/zram-swap-min instead, which uses the real
  #    swap-utils binaries.
  # 2. Even with real swap-utils' own mkswap/swapon run by hand, `/proc/swaps`
  #    never appeared and swapon reported "Function not implemented" (ENOSYS)
  #    - confirmed on real hardware via SSH, with no corresponding dmesg
  #    output, meaning the kernel itself rejected it. This is despite
  #    target/linux/generic/config-6.12 showing CONFIG_SWAP=y upstream - the
  #    actual shipped ImageBuilder kernel evidently doesn't have it, for
  #    reasons not fully root-caused (likely something in the Kconfig
  #    dependency chain auto-disabling it for this device/profile).
  # 3. Given (2), this repo no longer uses ImageBuilder for build-firmware -
  #    see that job below. It builds from full source instead, with an
  #    explicit `echo "CONFIG_SWAP=y" >> .../config-6.12` forced into the
  #    kernel config before the kernel builds, to settle the question by
  #    construction rather than trusting whatever the upstream default
  #    resolves to.
  PACKAGES: >-
    luci
    dnsmasq
    kmod-tun
    kmod-zram
    swap-utils
    -dnsmasq-full
    -odhcp6c
    -odhcpd-ipv6only
    -kmod-usb2
    -kmod-usb-ohci
    -kmod-usb-ledtrig-usbport
    -kmod-usb-serial-option
    -kmod-usb-net-qmi-wwan
    -uqmi
    -ppp
    -ppp-mod-pppoe

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: "ImmortalWrt release version"
        required: true
        default: "25.12.1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.inputs.immortalwrt_version || '25.12.1' }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # Cross-compiles tailscaled via the SDK and publishes it to this repo's
  # `tailscale-latest` release. Independent of build-firmware - the init
  # script baked into the firmware fetches from that fixed release URL at
  # router *boot* time, not at image *build* time, so there's no data
  # dependency between the two jobs here.
  build-tailscale:
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Install SDK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git \
            gettext libssl-dev xsltproc rsync unzip python3 zstd file upx-ucl

      - name: Download SDK
        run: |
          set -euo pipefail
          FILE="immortalwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}/${FILE}"
          echo "Downloading $URL"
          curl -fL -o sdk.tar.zst "$URL"
          mkdir -p sdk
          tar --use-compress-program=unzstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: Build tailscale package
        run: |
          set -euo pipefail
          cd sdk
          ./scripts/feeds update packages
          ./scripts/feeds install tailscale
          echo "CONFIG_PACKAGE_tailscale=m" >> .config
          make defconfig
          make package/tailscale/compile V=s -j"$(nproc)"

      - name: Extract, strip, and compress the tailscaled binary
        run: |
          set -euo pipefail
          BASE="$(pwd)"
          APK="$(find sdk/bin/packages -iname 'tailscale-*.apk' | head -1)"
          test -n "$APK"
          echo "Built package: $APK"
          # .apk here is OpenWrt 25.12+'s APKv3/ADB format (custom binary
          # container, DEFLATE-compressed) - NOT a tar.gz despite the
          # extension. Plain `tar xzf` fails with "not in gzip format".
          # Use the SDK's own apk tool to extract it instead.
          APK_TOOL="$BASE/sdk/staging_dir/host/bin/apk"
          test -x "$APK_TOOL"
          WORK="$(mktemp -d)"
          (cd "$WORK" && "$APK_TOOL" extract --allow-untrusted "$BASE/$APK")
          BIN="$WORK/usr/sbin/tailscaled"
          test -x "$BIN"
          echo "Unstripped:"; ls -lh "$BIN"
          STRIP="$(find sdk/staging_dir/toolchain-* -iname '*-strip' | head -1)"
          test -n "$STRIP"
          "$STRIP" "$BIN"
          echo "Stripped:"; ls -lh "$BIN"
          upx --best "$BIN" && echo "UPX-compressed:" && ls -lh "$BIN" || echo "upx failed/skipped, shipping stripped-only binary"
          mkdir -p out
          cp "$BIN" out/tailscaled
          tar -czf "out/tailscaled-${ARCH}.tar.gz" -C out tailscaled
          sha256sum "out/tailscaled-${ARCH}.tar.gz" | awk '{print $1}' > "out/tailscaled-${ARCH}.tar.gz.sha256"
          rm out/tailscaled
          ls -lh out/

      - name: Publish to tailscale-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view tailscale-latest --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create tailscale-latest --repo "${{ github.repository }}" \
              --title "tailscaled (${ARCH}, rolling)" \
              --notes "Auto-built from the immortalwrt/packages net/tailscale recipe via the ImmortalWrt SDK. Overwritten by each run of this workflow. Fetched at router boot time by files/etc/init.d/tailscale-ram - not baked into the firmware image, it doesn't fit in flash (see README)."
          gh release upload tailscale-latest --repo "${{ github.repository }}" --clobber \
            "out/tailscaled-${ARCH}.tar.gz" "out/tailscaled-${ARCH}.tar.gz.sha256"

  # Full source build, not ImageBuilder - needed to force CONFIG_SWAP=y into
  # the kernel (see the PACKAGES comment above for why). Much slower
  # (toolchain + kernel + packages all compiled from scratch, ~1-2 hours vs
  # ImageBuilder's ~1 minute), but it's the only way to actually control the
  # kernel config rather than trusting whatever ImageBuilder's prebuilt
  # kernel happens to have.
  build-firmware:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          sudo docker image prune -a -f 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget zstd \
            python3-distutils

      - name: Clone ImmortalWrt source (v${{ env.VERSION }})
        run: |
          set -euo pipefail
          git clone --branch "v${VERSION}" --depth 1 https://github.com/immortalwrt/immortalwrt.git src

      - name: Update and install feeds
        run: |
          set -euo pipefail
          cd src
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Force-enable CONFIG_SWAP in the kernel config
        run: |
          set -euo pipefail
          echo "CONFIG_SWAP=y" >> src/target/linux/ramips/mt76x8/config-6.12

      - name: Configure target, profile, and packages
        run: |
          set -euo pipefail
          cp ci/mt76x8-seed.config src/.config
          cd src
          make defconfig

      - name: Build (this takes a while)
        run: |
          set -euo pipefail
          cd src
          make download -j"$(nproc)"
          make -j"$(nproc)" FILES="${{ github.workspace }}/files" || make -j1 V=s FILES="${{ github.workspace }}/files"

      - name: Check overlay headroom
        run: |
          set -euo pipefail
          FIRMWARE_BUDGET=7995392  # 7808k, the fixed "firmware" MTD partition size for this profile
          # JFFS2 refused to mount at 4 erase blocks (256KB - confirmed on real
          # hardware, "Too few erase blocks (4)"). 8 erase blocks (512KB, 64KB
          # erasesize on this device) is a commonly-cited practical minimum
          # for JFFS2 to actually work rather than just barely mount, so that's
          # the bar here rather than the more arbitrary 1MB tried earlier.
          MIN_OVERLAY=524288
          IMG="$(find src/bin/targets/${TARGET}/${SUBTARGET} -iname '*squashfs-sysupgrade.bin')"
          SIZE=$(stat -c%s "$IMG")
          FREE=$((FIRMWARE_BUDGET - SIZE))
          echo "Firmware image: $IMG"
          echo "Image size: $SIZE bytes"
          echo "Estimated overlay headroom: $FREE bytes"
          if [ "$FREE" -lt "$MIN_OVERLAY" ]; then
            echo "::error::Only ${FREE} bytes would be left for the writable overlay (want >= ${MIN_OVERLAY}). JFFS2 will likely fail to mount and settings won't persist across reboots - see the comment block at the top of this workflow file. Trim PACKAGES further."
            exit 1
          fi

      - name: Collect output
        run: |
          set -euo pipefail
          mkdir -p out
          cp src/bin/targets/${TARGET}/${SUBTARGET}/*${PROFILE}* out/
          ls -lh out/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.VERSION }}-${{ env.PROFILE }}
          path: out/
          retention-days: 30
